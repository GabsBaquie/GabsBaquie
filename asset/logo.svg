<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      @keyframes glow {
        0%, 100% { filter: drop-shadow(0 0 5px rgba(96, 165, 250, 0.3)); }
        50% { filter: drop-shadow(0 0 20px rgba(96, 165, 250, 0.6)); }
      }
      @keyframes rotateBg {
        0% { transform: rotate(0deg); }
        360% { transform: rotate(360deg); }
      }
      @keyframes slideBorder {
        0% { stroke-dashoffset: 1000; }
        100% { stroke-dashoffset: 0; }
      }

      .logo-container {
        animation: float 3s ease-in-out infinite;
      }
      .glow-effect {
        animation: glow 2s ease-in-out infinite;
      }
      .rotating-border {
        animation: rotateBg 20s linear infinite;
      }
      .text-main {
        font-family: 'Inter', 'Helvetica Neue', sans-serif;
        font-weight: 700;
        font-size: 32px;
        fill: #E6EDF3;
        letter-spacing: -0.5px;
      }
      .text-sub {
        font-family: 'Inter', 'Helvetica Neue', sans-serif;
        font-weight: 400;
        font-size: 12px;
        fill: #60A5FA;
        letter-spacing: 1px;
      }
    </style>

    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer rotating ring -->
  <g class="rotating-border">
    <circle cx="150" cy="150" r="145" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- Background circle -->
  <circle cx="150" cy="150" r="140" fill="url(#bgGradient)" />

  <!-- Inner accent elements -->
  <g class="glow-effect">
    <!-- Left accent -->
    <circle cx="100" cy="120" r="8" fill="#60A5FA" opacity="0.4"/>
    <!-- Right accent -->
    <circle cx="200" cy="160" r="8" fill="#60A5FA" opacity="0.4"/>
  </g>

  <!-- Main content group with float animation -->
  <g class="logo-container glow-effect">
    <!-- "GB" initials with style -->
    <text x="150" y="145" text-anchor="middle" class="text-main">GB</text>

    <!-- Full name -->
    <text x="150" y="175" text-anchor="middle" class="text-sub">GABS BAQUIÉ</text>
  </g>

  <!-- Corner decorative elements -->
  <rect x="60" y="60" width="3" height="3" fill="#60A5FA" opacity="0.3"/>
  <rect x="237" y="60" width="3" height="3" fill="#60A5FA" opacity="0.3"/>
  <rect x="60" y="237" width="3" height="3" fill="#60A5FA" opacity="0.3"/>
  <rect x="237" y="237" width="3" height="3" fill="#60A5FA" opacity="0.3"/>
</svg>
