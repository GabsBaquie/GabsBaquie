<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
      }

      @keyframes spin30 {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes glow {
        0%, 100% { filter: drop-shadow(0 0 8px rgba(61, 97, 255, 0.3)); }
        50% { filter: drop-shadow(0 0 20px rgba(61, 97, 255, 0.6)); }
      }

      @keyframes slideIn {
        0% { opacity: 0; transform: translateX(-50px); }
        100% { opacity: 1; transform: translateX(0); }
      }

      .blob { animation: float 8s ease-in-out infinite; }
      .blob2 { animation: float 10s ease-in-out infinite 1s; }
      .blob3 { animation: float 9s ease-in-out infinite 0.5s; }
      .spin-halo { animation: spin30 30s linear infinite; transform-origin: 600px 140px; }
      .glow-text { animation: glow 3s ease-in-out infinite; }
      .slide { animation: slideIn 0.8s ease-out; }
    </style>

    <linearGradient id="grad-indigo-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0.8" />
    </linearGradient>

    <filter id="blur-60">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60" />
    </filter>

    <filter id="glow-filter">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="#06080E"/>

  <!-- Halos flous animés (signature de la charte) -->
  <g class="blob">
    <circle cx="150" cy="80" r="140" fill="#6366F1" opacity="0.5" filter="url(#blur-60)"/>
  </g>

  <g class="blob2">
    <circle cx="1050" cy="120" r="160" fill="#06B6D4" opacity="0.35" filter="url(#blur-60)"/>
  </g>

  <g class="blob3">
    <circle cx="600" cy="260" r="120" fill="#4338CA" opacity="0.3" filter="url(#blur-60)"/>
  </g>

  <!-- Ring decoratif qui tourne -->
  <g class="spin-halo">
    <circle cx="600" cy="30" r="6" fill="#3D61FF" opacity="0.7"/>
    <circle cx="750" cy="100" r="5" fill="#06B6D4" opacity="0.6"/>
    <circle cx="450" cy="100" r="5" fill="#6366F1" opacity="0.6"/>
  </g>

  <!-- Texte principal animé -->
  <g class="slide">
    <text x="600" y="110" text-anchor="middle" font-family="'Source Code Pro', monospace" font-size="54" font-weight="700" fill="#FCFCFD" filter="url(#glow-filter)" letter-spacing="-1">
      Gabs Baquié
    </text>
  </g>

  <g class="slide" style="animation-delay: 0.15s;">
    <text x="600" y="160" text-anchor="middle" font-family="'Source Code Pro', monospace" font-size="18" font-weight="500" fill="rgba(242, 244, 245, 0.8)" filter="url(#glow-filter)">
      Frontend Developer · Design Passionate · Shopify Expert
    </text>
  </g>

  <!-- Ligne decorative avec gradient -->
  <line x1="250" y1="180" x2="950" y2="180" stroke="url(#grad-indigo-cyan)" stroke-width="2" opacity="0.4" stroke-dasharray="15,8"/>

  <!-- Accents ponctuels -->
  <circle cx="100" cy="240" r="4" fill="#06B6D4" opacity="0.6" class="glow-text"/>
  <circle cx="1100" cy="50" r="4" fill="#3D61FF" opacity="0.6" class="glow-text"/>
  <circle cx="600" cy="270" r="3" fill="#06B6D4" opacity="0.5"/>
</svg>
